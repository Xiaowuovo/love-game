<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>我们的平行时空</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#FFB6C1">
    <meta name="description" content="一个属于我们的模拟经营游戏">
    
    <!-- Apple iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="平行时空">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            background: #FFF9F5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .heart-button {
            transition: transform 0.1s ease;
            touch-action: manipulation;
        }
        
        .heart-button:active {
            transform: scale(0.92);
        }
        
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(255, 182, 193, 0.15);
            transition: all 0.3s ease;
        }
        
        .card:active {
            transform: scale(0.98);
        }
        
        .modal {
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.4);
        }
        
        .modal-content {
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.5s ease;
        }
        
        .tab-active {
            background: #FFB6C1;
            color: white;
        }
        
        .tab-inactive {
            background: white;
            color: #888;
        }
        
        .floating-heart {
            position: fixed;
            animation: floatUp 2s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(0.5);
            }
        }
        
        .progress-bar {
            transition: width 0.3s ease;
            background: linear-gradient(90deg, #FFB6C1, #FFC0CB);
            border-radius: 10px;
        }
        
        .badge {
            background: linear-gradient(135deg, #FFB6C1, #FFC0CB);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .pulse-animation {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        
        .shine-effect {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            background-size: 200% 100%;
            animation: shine 3s infinite;
        }
        
        .achievement-badge {
            position: relative;
            overflow: hidden;
        }
        
        .achievement-badge::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            animation: rotate 3s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .stat-card {
            background: linear-gradient(135deg, #fff 0%, #fff9f5 100%);
        }
        
        .theme-dark {
            background: #1a1a2e !important;
        }
        
        .theme-dark .card {
            background: #16213e !important;
            color: white !important;
        }
        
        .theme-dark h1, .theme-dark h3, .theme-dark h4 {
            color: white !important;
        }
        
        .theme-dark .text-gray-800 {
            color: #e0e0e0 !important;
        }
        
        .theme-dark .text-gray-600 {
            color: #b0b0b0 !important;
        }
        
        .theme-dark .text-gray-500 {
            color: #909090 !important;
        }
        
        .theme-dark .bg-white\/80 {
            background: rgba(22, 33, 62, 0.8) !important;
        }
        
        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 9999;
            animation: confetti 3s ease-out forwards;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10%, 30% { transform: scale(0.9); }
            20%, 40% { transform: scale(1.1); }
        }
        
        .heartbeat {
            animation: heartbeat 1s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 182, 193, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 182, 193, 0.8), 0 0 30px rgba(255, 182, 193, 0.6); }
        }
        
        .glow-effect {
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        
        .wiggle {
            animation: wiggle 0.5s ease-in-out;
        }
        
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        .rainbow-effect {
            animation: rainbow 3s linear infinite;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .hover-lift {
            transition: transform 0.3s ease;
        }
        
        .hover-lift:hover {
            transform: translateY(-5px);
        }
        
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0.5); opacity: 0; }
        }
        
        .particle {
            animation: float-up 2s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen pb-20">
    
    <!-- Header -->
    <div class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-pink-100" style="padding-top: env(safe-area-inset-top);">
        <div class="px-6 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">我们的平行时空</h1>
                    <p class="text-sm text-gray-500 mt-1">与你共度的每一秒 ♡</p>
                </div>
                <div class="text-right">
                    <div class="flex items-center gap-2 justify-end">
                        <i data-lucide="heart" class="w-5 h-5 text-pink-400"></i>
                        <span class="text-2xl font-bold text-pink-500" id="total-hearts">0</span>
                    </div>
                    <div class="text-xs text-gray-500 mt-1">
                        <span id="hearts-per-second">0</span>/秒
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="px-6 py-6">
        
        <!-- Heart Button Section -->
        <div class="card p-8 mb-6 text-center">
            <button id="heart-btn" class="heart-button mx-auto">
                <div class="relative inline-block">
                    <div class="absolute inset-0 bg-pink-300 rounded-full blur-2xl opacity-50"></div>
                    <div class="relative w-32 h-32 bg-gradient-to-br from-pink-400 to-pink-500 rounded-full flex items-center justify-center shadow-lg float-animation">
                        <i data-lucide="heart" class="w-16 h-16 text-white fill-white"></i>
                    </div>
                </div>
            </button>
            <p class="text-gray-600 mt-4 text-sm">点击爱心，积累我们的回忆</p>
            <div class="mt-3">
                <span class="badge" id="click-value">+1</span>
                <div id="combo-display" class="mt-2 text-orange-500 font-bold text-sm hidden"></div>
            </div>
        </div>
        
        <!-- Settings Button -->
        <div class="flex justify-end mb-4">
            <button id="settings-btn" class="card px-4 py-2 flex items-center gap-2">
                <i data-lucide="settings" class="w-4 h-4 text-gray-600"></i>
                <span class="text-sm text-gray-600">设置</span>
            </button>
        </div>
        
        <!-- Tabs -->
        <div class="grid grid-cols-2 gap-2 mb-6">
            <button class="tab-btn py-3 rounded-full font-semibold transition-all tab-active" data-tab="shop">
                <i data-lucide="shopping-bag" class="w-4 h-4 inline mr-1"></i>
                场景装饰
            </button>
            <button class="tab-btn py-3 rounded-full font-semibold transition-all tab-inactive" data-tab="collections">
                <i data-lucide="book-heart" class="w-4 h-4 inline mr-1"></i>
                回忆相册
            </button>
            <button class="tab-btn py-3 rounded-full font-semibold transition-all tab-inactive" data-tab="rewards">
                <i data-lucide="gift" class="w-4 h-4 inline mr-1"></i>
                兑换店
            </button>
            <button class="tab-btn py-3 rounded-full font-semibold transition-all tab-inactive" data-tab="achievements">
                <i data-lucide="trophy" class="w-4 h-4 inline mr-1"></i>
                成就
            </button>
            <button class="tab-btn py-3 rounded-full font-semibold transition-all tab-inactive" data-tab="stats">
                <i data-lucide="bar-chart" class="w-4 h-4 inline mr-1"></i>
                统计
            </button>
            <button class="tab-btn py-3 rounded-full font-semibold transition-all tab-inactive" data-tab="daily">
                <i data-lucide="calendar-check" class="w-4 h-4 inline mr-1"></i>
                签到
            </button>
            <button class="tab-btn py-3 rounded-full font-semibold transition-all tab-inactive" data-tab="upgrades">
                <i data-lucide="zap" class="w-4 h-4 inline mr-1"></i>
                升级
            </button>
            <button class="tab-btn py-3 rounded-full font-semibold transition-all tab-inactive" data-tab="events">
                <i data-lucide="star" class="w-4 h-4 inline mr-1"></i>
                事件
            </button>
        </div>
        
        <!-- Shop Tab -->
        <div id="shop-tab" class="tab-content">
            <div class="space-y-4" id="shop-items"></div>
        </div>
        
        <!-- Collections Tab -->
        <div id="collections-tab" class="tab-content hidden">
            <div class="space-y-4" id="collections-list"></div>
        </div>
        
        <!-- Rewards Tab -->
        <div id="rewards-tab" class="tab-content hidden">
            <div class="space-y-4" id="rewards-list"></div>
        </div>
        
        <!-- Achievements Tab -->
        <div id="achievements-tab" class="tab-content hidden">
            <div class="space-y-4" id="achievements-list"></div>
        </div>
        
        <!-- Stats Tab -->
        <div id="stats-tab" class="tab-content hidden">
            <div class="space-y-4" id="stats-content"></div>
        </div>
        
        <!-- Daily Tab -->
        <div id="daily-tab" class="tab-content hidden">
            <div class="space-y-4" id="daily-content"></div>
        </div>
        
        <!-- Upgrades Tab -->
        <div id="upgrades-tab" class="tab-content hidden">
            <div class="space-y-4" id="upgrades-list"></div>
        </div>
        
        <!-- Events Tab -->
        <div id="events-tab" class="tab-content hidden">
            <div class="space-y-4" id="events-content"></div>
        </div>
        
    </div>
    
    <!-- Modal -->
    <div id="modal" class="modal fixed inset-0 z-50 hidden items-center justify-center p-6">
        <div class="modal-content card max-w-md w-full p-8 text-center">
            <div class="w-20 h-20 bg-gradient-to-br from-pink-400 to-pink-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="sparkles" class="w-10 h-10 text-white"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 mb-3" id="modal-title"></h3>
            <p class="text-gray-600 leading-relaxed mb-6" id="modal-text"></p>
            <button id="modal-close" class="w-full py-3 bg-gradient-to-r from-pink-400 to-pink-500 text-white rounded-full font-semibold">
                继续我们的故事
            </button>
        </div>
    </div>
    
    <!-- Coupon Modal -->
    <div id="coupon-modal" class="modal fixed inset-0 z-50 hidden items-center justify-center p-6">
        <div class="modal-content card max-w-md w-full p-8">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-gradient-to-br from-pink-400 to-pink-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="ticket" class="w-10 h-10 text-white"></i>
                </div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">兑换成功！</h3>
                <p class="text-sm text-gray-500">请截图保存此券</p>
            </div>
            
            <div class="bg-gradient-to-br from-pink-50 to-pink-100 rounded-2xl p-6 mb-6">
                <div class="text-center mb-4">
                    <div class="text-3xl mb-2" id="coupon-emoji">🎁</div>
                    <h4 class="text-xl font-bold text-gray-800" id="coupon-name"></h4>
                    <p class="text-sm text-gray-600 mt-2" id="coupon-desc"></p>
                </div>
                
                <div class="border-t-2 border-dashed border-pink-300 pt-4 mt-4">
                    <div class="flex justify-between items-center text-xs text-gray-500 mb-2">
                        <span>兑换码</span>
                        <span id="coupon-date"></span>
                    </div>
                    <div class="bg-white rounded-lg p-3 text-center">
                        <code class="text-lg font-mono font-bold text-pink-600" id="coupon-code"></code>
                    </div>
                </div>
            </div>
            
            <button id="coupon-close" class="w-full py-3 bg-gradient-to-r from-pink-400 to-pink-500 text-white rounded-full font-semibold">
                知道了
            </button>
        </div>
    </div>

    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => {
                    self.skipWaiting();
                });
                
                self.addEventListener('activate', (e) => {
                    self.clients.claim();
                });
            `;
            
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl).catch(() => {});

        // Load game state
        function loadGame() {
            const saved = localStorage.getItem('parallelUniverseGame');
            if (saved) {
                const loaded = JSON.parse(saved);
                gameState = { ...gameState, ...loaded };
                
                // Restore shop items owned count
                shopItems.forEach(item => {
                    if (gameState.items[item.id]) {
                        item.owned = gameState.items[item.id];
                    }
                });
                
                calculateDPS();
                updateUI();
            }
        }
        
        // Save game state
        function saveGame() {
            localStorage.setItem('parallelUniverseGame', JSON.stringify(gameState));
        }
        
        // Calculate DPS
        function calculateDPS() {
            gameState.dps = 0;
            shopItems.forEach(item => {
                if (item.owned > 0) {
                    gameState.dps += item.baseDps * item.owned;
                }
            });
            // Apply multipliers
            gameState.dps *= gameState.dpsMultiplier;
            
            // Track max DPS
            if (!gameState.maxDps) gameState.maxDps = 0;
            if (gameState.dps > gameState.maxDps) {
                gameState.maxDps = gameState.dps;
            }
        }
        
        // Get item cost
        function getItemCost(item) {
            return Math.floor(item.baseCost * Math.pow(1.15, item.owned));
        }
        
        // Sound effects
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx && soundEnabled) {
                audioCtx = new AudioContext();
            }
        }
        
        function playSound(type) {
            if (!soundEnabled) return;
            initAudio();
            if (!audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            switch(type) {
                case 'click':
                    oscillator.frequency.value = 800;
                    gainNode.gain.value = 0.1;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.05);
                    break;
                case 'buy':
                    oscillator.frequency.value = 600;
                    gainNode.gain.value = 0.15;
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                    break;
                case 'achievement':
                    oscillator.frequency.value = 1000;
                    gainNode.gain.value = 0.2;
                    oscillator.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                    break;
                case 'success':
                    oscillator.frequency.value = 1200;
                    gainNode.gain.value = 0.15;
                    oscillator.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    break;
            }
        }

        document.getElementById('heart-btn').addEventListener('click', (e) => {
            const value = gameState.clickValue * gameState.clickMultiplier;
            gameState.hearts += value;
            gameState.totalHearts += value;
            gameState.totalClicks++;
            
            // Combo system
            comboCount++;
            if (comboTimeout) clearTimeout(comboTimeout);
            
            if (comboCount >= 5) {
                comboDisplay.textContent = `${comboCount} COMBO! 🔥`;
                comboDisplay.classList.remove('hidden');
                
                // Combo bonus
                if (comboCount >= 10 && comboCount % 10 === 0) {
                    const bonus = Math.floor(value * comboCount * 0.1);
                    gameState.hearts += bonus;
                    gameState.totalHearts += bonus;
                    
                    const comboNotif = document.createElement('div');
                    comboNotif.className = 'fixed top-1/3 left-1/2 transform -translate-x-1/2 z-50 text-4xl font-bold text-orange-500 fade-in-up rainbow-effect';
                    comboNotif.textContent = `${comboCount} COMBO! +${bonus}`;
                    document.body.appendChild(comboNotif);
                    setTimeout(() => comboNotif.remove(), 2000);
                    
                    playSound('achievement');
                    createConfetti();
                }
            } else {
                comboDisplay.classList.add('hidden');
            }
            
            comboTimeout = setTimeout(() => {
                comboCount = 0;
                comboDisplay.classList.add('hidden');
            }, 2000);
            
            // Track click speed for achievement
            const now = Date.now();
            clickTimes.push(now);
            clickTimes = clickTimes.filter(t => now - t < 30000);
            if (clickTimes.length >= 100 && !gameState.achievements.includes('speed')) {
                gameState.achievements.push('speed');
                showAchievement('快手玩家', '30 秒内点击 100 次');
            }
            
            vibrate(10);
            
            const rect = e.currentTarget.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top;
            
            createFloatingHeart(x, y, value);
            playSound('click');

            checkCollections();

                gameState.maxHearts = gameState.hearts;

        // Buy item

            const item = shopItems.find(i => i.id === id);
            if (!item) return;
            
            const cost = getItemCost(item);

            gameState.hearts -= cost;
            item.owned++;
            gameState.items[id] = item.owned;

            saveGame();

            gameState.hearts -= reward.cost;
            
            const code = generateCouponCode();
            const redemption = {
                id: reward.id,
                code: code,
                date: new Date().toISOString()
            };
            
            gameState.redeemedRewards.push(redemption);
            
            showCouponModal(reward, code);
            playSound('success');

            vibrate(20);
            updateUI();
            saveGame();

            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 12; i++) {
                if (i > 0 && i % 4 === 0) code += '-';
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        // Check login streak and offline earnings
        function checkLoginStreak() {
            const now = Date.now();
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            
            // Calculate offline earnings
            if (gameState.lastLoginTime && gameState.offlineBonus) {
                const offlineTime = now - gameState.lastLoginTime;
                const offlineHours = offlineTime / (1000 * 60 * 60);
                
                if (offlineHours > 0.1 && offlineHours < 24) {
                    const offlineEarnings = Math.floor(gameState.dps * (offlineTime / 1000) * 0.5);
                    
                    if (offlineEarnings > 0) {
                        gameState.hearts += offlineEarnings;
                        gameState.totalHearts += offlineEarnings;
                        
                        showModal('💰 离线收益', `你离开了 ${offlineHours.toFixed(1)} 小时\n获得 ${offlineEarnings.toLocaleString()} 爱心！`);
                        playSound('success');
                        createConfetti();
                    }
                }
            }
            
            gameState.lastLoginTime = now;
            
            if (!gameState.lastLogin) {
                gameState.lastLogin = today;
                gameState.loginStreak = 1;
            } else if (gameState.lastLogin === yesterday) {
                gameState.lastLogin = today;
            } else if (gameState.lastLogin !== today) {
                gameState.loginStreak = 0;
                gameState.lastLogin = today;
            }
            
            saveGame();
        }

            const events = ['critical', 'rainbow', 'gift', 'meteor'];

            switch(event) {

                    const oldClickMult = gameState.clickMultiplier;
                    gameState.clickMultiplier *= 5;
                    showModal('💝 爱心暴击！', '点击产出 x5，持续 5 分钟！');

            });
        }
        
        // Loading animation
        const loader = document.createElement('div');
        loader.className = 'fixed inset-0 z-[200] bg-gradient-to-br from-pink-100 to-purple-100 flex items-center justify-center';
        loader.innerHTML = `
            <div class="text-center">
                <div class="relative inline-block mb-6">
                    <div class="w-24 h-24 bg-gradient-to-br from-pink-400 to-pink-500 rounded-full animate-ping absolute"></div>
                    <div class="w-24 h-24 bg-gradient-to-br from-pink-400 to-pink-500 rounded-full flex items-center justify-center relative">
                        <span class="text-5xl">💕</span>
                    </div>
                </div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">我们的平行时空</h2>
                <p class="text-gray-600 text-lg">正在加载中...</p>
                <div class="mt-4 flex justify-center gap-2">
                    <div class="w-3 h-3 bg-pink-500 rounded-full animate-bounce"></div>
                    <div class="w-3 h-3 bg-pink-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-3 h-3 bg-pink-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>
        `;
        document.body.appendChild(loader);
        
        // Initialize
        setTimeout(() => {
            lucide.createIcons();
            loadGame();
            checkLoginStreak();
            checkAchievements();
            updateUI();
            
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.5s';
            setTimeout(() => {
                loader.remove();
                
                // Show tutorial for first-time users
                if (!gameState.tutorialCompleted) {
                    setTimeout(() => showTutorial(), 500);
                }
            }, 500);
        }, 1500);
        
        // Prevent zoom on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
    </script>
</body>
</html>
